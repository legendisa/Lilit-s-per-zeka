name: Lilit APK Basici
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Python ve Java Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Sistem Paketlerini Yukle
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-setuptools
          sudo apt-get install -y zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp-dev libmpc-dev

      - name: Buildozer Kur
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: APK Derle (Samsung A7 - 32Bit)
        run: |
          yes | buildozer -v android debug
        continue-on-error: false

      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v3
        with:
          name: Lilit-A7-APK
          path: bin/*.apk
