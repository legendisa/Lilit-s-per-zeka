name: Lilit Singularity Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Buildozer ve Sistem Gereksinimleri
        run: |
          sudo apt update
          sudo apt install -path python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt install -y libgstreamer1.0-gstreamer-lite-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: APK Derleme (Bu islem 15-20 dk surer)
        run: |
          yes | buildozer -v android debug

      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Lilit-v2-Singularity
          path: bin/*.apk
